apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: my-web-app
        image: 527769887303.dkr.ecr.us-east-1.amazonaws.com/my-web-app:1b81fd34e67a9df463b7ec4d9f7922a5a7e07eb1
        ports:
        - containerPort: 80