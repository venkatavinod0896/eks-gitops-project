apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: my-web-app
        image: 527769887303.dkr.ecr.us-east-1.amazonaws.com/my-web-app:18a76d6def6aeba13df9dd1c74d00193be133217
        ports:
        - containerPort: 80