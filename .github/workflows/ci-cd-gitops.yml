name: Full CI-CD GitOps Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ci-cd-gitops.yml'
      - 'cart-service/**'
      - 'user-service/**'
      - 'order-service/**'
      - 'payment-service/**'

  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci-cd-gitops.yml'
      - 'cart-service/**'
      - 'user-service/**'
      - 'order-service/**'
      - 'payment-service/**'

  workflow_dispatch:

concurrency:
  group: gitops-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: read

env:
  AWS_REGION: us-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -e

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=()
          KNOWN_SERVICES=(
            "cart-service"
            "user-service"
            "order-service"
            "payment-service"
          )

          for svc in "${KNOWN_SERVICES[@]}"; do
            if echo "$CHANGED_FILES" | grep -qE "^${svc}/"; then
              SERVICES+=("$svc")
            fi
          done

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo "No service code changes found."
          else
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -cs '{service: .}')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
            echo "Matrix JSON: $JSON"
          fi

  pr-validate:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image for PR Validation
        shell: bash
        run: |
          set -e
          SERVICE="${{ matrix.service }}"
          IMAGE_TAG="${SERVICE}-pr-${{ github.sha }}"

          echo "Validating Docker build for $SERVICE"
          docker build -t "$IMAGE_TAG" "./$SERVICE"

  main-deploy:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Variables
        id: vars
        shell: bash
        run: |
          set -e
          SERVICE="${{ matrix.service }}"
          FULL_SHA="${{ github.sha }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_URI="${REGISTRY}/${SERVICE}:git-${FULL_SHA}"

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "full_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

          echo "Service   : $SERVICE"
          echo "Image URI : $IMAGE_URI"

      - name: Build Docker Image
        shell: bash
        run: |
          set -e
          SERVICE="${{ steps.vars.outputs.service }}"
          IMAGE_URI="${{ steps.vars.outputs.image_uri }}"
          docker build -t "$IMAGE_URI" "./$SERVICE"

      - name: Push Docker Image
        shell: bash
        run: |
          set -e
          IMAGE_URI="${{ steps.vars.outputs.image_uri }}"
          docker push "$IMAGE_URI"

      - name: Update Kubernetes Manifest
        shell: bash
        run: |
          set -e
          SERVICE="${{ steps.vars.outputs.service }}"
          IMAGE_URI="${{ steps.vars.outputs.image_uri }}"
          FILE="k8s-manifests/${SERVICE}/deployment.yaml"

          if [ ! -f "$FILE" ]; then
            echo "Deployment file not found: $FILE"
            exit 1
          fi

          sed -i -E "0,/^[[:space:]]*image:[[:space:]]*.*/s|^[[:space:]]*image:[[:space:]]*.*|        image: ${IMAGE_URI}|" "$FILE"

          echo "Updated $FILE"
          cat "$FILE"

      - name: Commit and Push Manifest
        shell: bash
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add k8s-manifests

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          SERVICE="${{ steps.vars.outputs.service }}"
          FULL_SHA="${{ steps.vars.outputs.full_sha }}"

          git commit -m "gitops: update ${SERVICE} image to git-${FULL_SHA} [skip ci]"
          git push origin main